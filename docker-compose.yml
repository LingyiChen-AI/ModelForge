# docker-compose.yml
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: modelforge
      POSTGRES_PASSWORD: modelforge
      POSTGRES_DB: modelforge
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modelforge"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports: ["6379:6379"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

  # MLflow 3.x. sqlite backend store(容器内卷),模型产物由客户端直传 MinIO
  # 的 mlflow 桶(--no-serve-artifacts),故 server 端无需 S3 凭证/boto3。
  # 升级镜像 tag 前先对卷里的 sqlite 跑 `mlflow db upgrade`。
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.13.0
    container_name: modelforge-mlflow
    depends_on: [minio]
    command: >
      bash -c "mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root s3://mlflow/ --no-serve-artifacts"
    volumes: ["mlflowdata:/mlflow"]
    ports: ["5500:5000"]

volumes:
  pgdata:
  miniodata:
  mlflowdata:
